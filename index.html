<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Климатические данные | СП 20, СП 131, СП 22</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0d10">
<style>
  :root {
    --bg: #0b0d10;
    --fg: #d4d8e0;
    --card: #14171f;
    --card-border: #1e222d;
    --card-header-bg: #0f1218;
    --input-bg: #14171f;
    --input-border: #2a2e3a;
    --input-fg: #e0e6f0;
    --suggest-bg: #1a1d26;
    --suggest-hover: #242836;
    --muted: #6b7380;
    --accent: #4fc3f7;
    --accent-rgb: 79,195,247;
    --warn: #ffc107;
    --danger: #f44336;
    --success: #4caf50;
    --param-bg: #0f1218;
    --chart-zero: rgba(255,255,255,0.08);
    --chart-area-1: rgba(79,195,247,0.35);
    --chart-area-5: rgba(79,195,247,0.01);
    --footer: #4a5568;
    --pill-bg: #1e222d;
    --pill-hover-bg: rgba(79,195,247,0.12);
    --tooltip-bg: #1a1d26;
    --tooltip-border: #2a4a5e;
    --shadow: rgba(0,0,0,0.4);
  }
  :root[data-theme="light"] {
    --bg: #f4f6f9;
    --fg: #1a1d26;
    --card: #ffffff;
    --card-border: #d0d7e2;
    --card-header-bg: #eef1f5;
    --input-bg: #ffffff;
    --input-border: #c8cfda;
    --input-fg: #1a1d26;
    --suggest-bg: #ffffff;
    --suggest-hover: #eef1f5;
    --muted: #6b7280;
    --accent: #0284c7;
    --accent-rgb: 2,132,199;
    --warn: #b45309;
    --danger: #dc2626;
    --success: #16a34a;
    --param-bg: #f8fafc;
    --chart-zero: rgba(0,0,0,0.06);
    --chart-area-1: rgba(2,132,199,0.22);
    --chart-area-5: rgba(2,132,199,0.02);
    --footer: #6b7280;
    --pill-bg: #e2e8f0;
    --pill-hover-bg: rgba(2,132,199,0.1);
    --tooltip-bg: #ffffff;
    --tooltip-border: #c8cfda;
    --shadow: rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    min-height: 100vh;
    transition: background .3s, color .3s;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  header { text-align: center; margin-bottom: 30px; position: relative; }
  h1 { font-size: 1.8rem; color: var(--accent); font-weight: 600; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  .theme-toggle {
    position: absolute; right: 0; top: 0;
    background: var(--card); border: 1px solid var(--card-border); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; font-size: 0.85rem; color: var(--muted);
    display: flex; align-items: center; gap: 6px; transition: border-color .2s, color .2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 600px) {
    .theme-toggle { position: static; margin: 0 auto 16px; width: fit-content; }
    header { padding-top: 10px; }
  }

  .search-wrap { position: relative; max-width: 500px; margin: 0 auto 30px; }
  #search { width: 100%; padding: 14px 18px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--input-bg); color: var(--input-fg); font-size: 1rem; transition: border-color .2s; }
  #search:focus { outline: none; border-color: var(--accent); }
  #suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; max-height: 260px; overflow-y: auto;
    background: var(--suggest-bg); border: 1px solid var(--input-border); border-radius: 10px; z-index: 10;
    display: none; box-shadow: 0 8px 24px var(--shadow);
  }
  .sug-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--card-border); transition: background .15s; }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover, .sug-item.active { background: var(--suggest-hover); }
  .sug-name { color: var(--input-fg); font-weight: 500; }
  .sug-region { color: var(--muted); font-size: 0.8rem; }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; transition: background .3s, border-color .3s; }
  .card-header { padding: 22px 24px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .city-name { font-size: 1.4rem; font-weight: 600; color: var(--fg); }
  .city-meta { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  .status-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status-verified { background: rgba(76, 175, 80, 0.15); color: var(--success); }
  :root[data-theme="light"] .status-verified { background: rgba(22,163,74,0.12); }
  .status-partial { background: rgba(255, 193, 7, 0.15); color: var(--warn); }
  :root[data-theme="light"] .status-partial { background: rgba(180,83,9,0.1); }
  .status-requires_verification { background: rgba(244, 67, 54, 0.15); color: var(--danger); }
  :root[data-theme="light"] .status-requires_verification { background: rgba(220,38,38,0.1); }

  .tabs { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--card-border); background: var(--card-header-bg); overflow-x: auto; }
  .tab { padding: 12px 16px; cursor: pointer; font-size: 0.88rem; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: color .2s; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--accent); border-color: var(--accent); }

  .tab-content { display: none; padding: 22px 24px; }
  .tab-content.active { display: block; }

  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin: 20px 0 12px; font-weight: 600; }
  .section-title:first-child { margin-top: 0; }

  .param-card { background: var(--param-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 16px; transition: border-color .2s; }
  .param-card:hover { border-color: var(--accent); }
  .param-label { color: var(--muted); font-size: 0.82rem; margin-bottom: 6px; }
  .param-value { font-size: 1.25rem; font-weight: 600; color: var(--fg); }
  .param-unit { color: var(--muted); font-size: 0.85rem; margin-left: 4px; }
  .param-source { color: var(--muted); font-size: 0.72rem; margin-top: 8px; word-break: break-all; }

  .param-sm .param-value { font-size: 1.05rem; }

  .comment-box { background: var(--param-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 14px; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  .terrain-pill { display: inline-block; padding: 3px 10px; border-radius: 6px; background: var(--pill-bg); margin: 2px; font-size: 0.8rem; color: var(--muted); transition: background .2s, color .2s; }
  .terrain-pill:hover { background: var(--pill-hover-bg); color: var(--accent); }

  /* Temp bar horizontal */
  .temp-bar-wrap { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; padding: 6px 0 16px; }
  .temp-bar-item { flex: 1 1 0; min-width: 58px; text-align: center; cursor: default; transition: transform .15s; }
  .temp-bar-item:hover { transform: translateY(-4px); }
  .temp-bar-month { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; }
  .temp-bar-value {
    font-size: 1.05rem; font-weight: 600; color: var(--fg); padding: 10px 0; border-radius: 8px;
    background: linear-gradient(180deg, rgba(var(--accent-rgb),0.18) 0%, rgba(var(--accent-rgb),0.05) 100%);
    border: 1px solid rgba(var(--accent-rgb),0.15); position: relative;
  }
  .temp-bar-value::after { content: '°C'; font-size: 0.65rem; color: var(--muted); margin-left: 1px; vertical-align: super; }
  .temp-bar-value.cold {
    background: linear-gradient(180deg, rgba(var(--accent-rgb),0.25) 0%, rgba(var(--accent-rgb),0.06) 100%);
    border-color: rgba(var(--accent-rgb),0.3); color: var(--accent);
  }
  .temp-bar-value.hot {
    background: linear-gradient(180deg, rgba(255,171,64,0.2) 0%, rgba(255,171,64,0.05) 100%);
    border-color: rgba(255,171,64,0.25); color: #ffab40;
  }
  .temp-bar-value.extreme {
    background: linear-gradient(180deg, rgba(239,83,80,0.22) 0%, rgba(239,83,80,0.05) 100%);
    border-color: rgba(239,83,80,0.28); color: #ef5350;
  }

  /* Canvas chart */
  .chart-wrap { background: var(--param-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px 24px; height: 340px; position: relative; }
  .chart-canvas { width: 100% !important; height: 100% !important; }
  #chartTooltip {
    position: absolute; pointer-events: none; opacity: 0; transition: opacity .15s;
    background: var(--tooltip-bg); border: 1px solid var(--tooltip-border); border-radius: 8px; padding: 8px 12px;
    font-size: 0.82rem; color: var(--input-fg); box-shadow: 0 4px 16px var(--shadow); z-index: 5;
  }
  #chartTooltip strong { color: var(--accent); }

  .yearly-temp { display: inline-flex; align-items: baseline; gap: 4px; margin-top: 12px; }
  .yearly-temp .label { color: var(--muted); font-size: 0.8rem; }
  .yearly-temp .value { font-size: 1.2rem; font-weight: 600; color: var(--fg); }

  footer { text-align: center; padding: 40px 0 20px; color: var(--footer); font-size: 0.82rem; }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 700px) {
    .temp-bar-wrap { gap: 3px; }
    .temp-bar-item { min-width: 44px; }
    .temp-bar-value { font-size: 0.85rem; padding: 8px 0; }
    .chart-wrap { height: 260px; padding: 12px; }
  }
  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <button class="theme-toggle" id="themeBtn" title="Переключить тему" aria-label="Переключить тему">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span id="themeLabel">Тёмная</span>
    </button>
    <h1>Климатические данные</h1>
    <div class="subtitle">СП 20.13330.2016 · СП 131.13330 · СП 22.13330 · СП 14.13330</div>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Введите город (например: Москва, Челябинск)..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <div id="content"></div>

  <footer>
    Разработано <a href="https://github.com/kilevoy" target="_blank">@Рыкунов А.Н.</a>
  </footer>
</div>

<script>
const API = 'settlements-climate.json';
let data = [];
let current = null;
let isLight = false;

function applyTheme() {
  const root = document.documentElement;
  isLight = localStorage.getItem('theme') === 'light';
  if (isLight) root.setAttribute('data-theme', 'light');
  else root.removeAttribute('data-theme');
  document.getElementById('themeLabel').textContent = isLight ? 'Светлая' : 'Тёмная';
  // redraw chart if visible
  if (current && current.monthlyTemps && document.getElementById('tempChart')) {
    drawChart(current.monthlyTemps.byMonth);
  }
}

document.getElementById('themeBtn').addEventListener('click', () => {
  localStorage.setItem('theme', isLight ? 'dark' : 'light');
  applyTheme();
});
applyTheme();

async function load() {
  try { const res = await fetch(API); data = await res.json(); }
  catch(e) { document.getElementById('content').innerHTML = '<div class="empty">Ошибка загрузки данных</div>'; }
}

const search = document.getElementById('search');
const sug = document.getElementById('suggestions');
const content = document.getElementById('content');

search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  if (q.length < 2) { sug.style.display='none'; return; }
  const matches = data.filter(d => d.settlement.toLowerCase().includes(q) || d.region.toLowerCase().includes(q)).slice(0,8);
  if (!matches.length) { sug.style.display='none'; return; }
  sug.innerHTML = matches.map((m,i) =>
    `<div class="sug-item ${i===0?'active':''}" data-idx="${data.indexOf(m)}">
      <div class="sug-name">${esc(m.settlement)}</div>
      <div class="sug-region">${esc(m.region)} · ${esc(m.settlementType)}</div>
    </div>`).join('');
  sug.style.display='block';
  document.querySelectorAll('.sug-item').forEach(el => el.addEventListener('click', () => selectCity(parseInt(el.dataset.idx))));
});

search.addEventListener('keydown', e => {
  const items = document.querySelectorAll('.sug-item');
  let active = [...items].findIndex(x => x.classList.contains('active'));
  if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active-1, 0); }
  else if (e.key === 'Enter') { e.preventDefault(); if (items[active]) selectCity(parseInt(items[active].dataset.idx)); }
  items.forEach(x => x.classList.remove('active'));
  if (items[active]) items[active].classList.add('active');
});

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) sug.style.display='none'; });

function selectCity(idx) {
  current = data[idx];
  search.value = current.settlement;
  sug.style.display='none';
  renderCity(current);
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function statusClass(s) {
  if (s==='verified') return 'status-verified';
  if (s==='partial') return 'status-partial';
  return 'status-requires_verification';
}

function pcard(label, value, unit, source, extraClass='') {
  return `<div class="param-card ${extraClass}">
    <div class="param-label">${esc(label)}</div>
    <div class="param-value">${value===null||value===undefined?'—':esc(String(value))}${unit?`<span class="param-unit">${esc(unit)}</span>`:''}</div>
    ${source?`<div class="param-source">${esc(source)}</div>`:''}
  </div>`;
}

function section(title) { return `<div class="section-title">${esc(title)}</div>`; }

function tempClass(t) {
  if (t === null || t === undefined) return '';
  if (t <= -15) return 'extreme';
  if (t <= -5) return 'cold';
  if (t >= 20) return 'extreme';
  if (t >= 15) return 'hot';
  return '';
}

function renderCity(d) {
  const tabs = [
    {id:'loads', label:'Нагрузки'},
    {id:'cold', label:'Холодный период'},
    {id:'warm', label:'Тёплый период'},
    {id:'frost', label:'Промерзание'},
    {id:'chart', label:'График температур'}
  ];

  let html = `<div class="card">
    <div class="card-header">
      <div>
        <div class="city-name">${esc(d.settlement)}</div>
        <div class="city-meta">${esc(d.region)} · ${esc(d.settlementType)} · id: ${esc(d.id)}</div>
      </div>
      <div><span class="status-badge ${statusClass(d.dataStatus)}">${esc(d.dataStatus)}</span></div>
    </div>`;

  html += `<div class="tabs">${tabs.map((t,i) => `<div class="tab ${i===0?'active':''}" data-tab="${t.id}">${esc(t.label)}</div>`).join('')}</div>`;

  // Tab loads
  html += `<div class="tab-content active" data-tab="loads">
    ${section('Снеговая нагрузка (СП 20.13330.2016, карта 1)')}
    <div class="grid-2">${d.snow ? pcard('Снеговой район', d.snow.region, '', d.snow.source) + pcard('Нормативное значение Sg', d.snow.sgKpa, 'кПа', d.snow.source) : '<div class="empty">Нет данных</div>'}</div>
    ${section('Ветровая нагрузка (СП 20.13330.2016, карта 3)')}
    <div class="grid-2">${d.wind ? pcard('Ветровой район', d.wind.region, '', d.wind.source) + pcard('Нормативное значение w₀', d.wind.w0Kpa, 'кПа', d.wind.source) : '<div class="empty">Нет данных</div>'}</div>
    ${section('Гололёдная нагрузка (СП 20.13330.2016, карта 4)')}
    <div class="grid-2">${d.ice ? pcard('Гололёдный район', d.ice.region, '', d.ice.source) + pcard('Толщина гололёда b при h=10 м', d.ice.iceThicknessMm, 'мм', d.ice.source) : '<div class="empty">Нет данных</div>'}</div>
    ${section('Сейсмичность (СП 14.13330, ОСР-2015)')}
    <div class="grid-2">${d.seismic ? pcard('Баллы сейсмичности (карта A)', d.seismic.points, 'баллов', d.seismic.source) : '<div class="empty">Нет данных</div>'}</div>
    ${section('Тип местности (СП 20.13330.2016, табл. 11.2)')}
    <div class="grid-2"><div class="param-card"><div class="param-label">Допустимые типы</div><div>${(d.terrain?.allowedTypes||[]).map(t=>`<span class="terrain-pill">${esc(t)}</span>`).join('')||'—'}</div></div></div>
    ${d.comment ? section('Комментарий') + `<div class="comment-box">${esc(d.comment)}</div>` : ''}
  </div>`;

  // Tab cold
  const cp = d.coldPeriod;
  html += `<div class="tab-content" data-tab="cold">
    ${cp ? `
    ${section('Температуры, °C')}
    <div class="grid-3">${pcard('Т холодн. суток, обесп. 0.98', cp.tempColdestDay098, '°C')}${pcard('Т холодн. суток, обесп. 0.92', cp.tempColdestDay092, '°C')}${pcard('Т холодн. 5-дневки, обесп. 0.98', cp.tempColdest5days098, '°C')}${pcard('Т холодн. 5-дневки, обесп. 0.92', cp.tempColdest5days092, '°C')}${pcard('Т с обеспеч. 0.94', cp.temp094, '°C')}${pcard('Абсолютный минимум', cp.absMin, '°C')}${pcard('Средняя сут. амплитуда', cp.dailyAmplitude, '°C')}</div>
    ${section('Периоды и средние температуры')}
    <div class="grid-3">${pcard('Продолж. при Т ≤ 0 °C', cp.durationLe0, 'сут', '', 'param-sm')}${pcard('Средняя Т при Т ≤ 0 °C', cp.meanLe0, '°C', '', 'param-sm')}${pcard('Отопит. период (Т ≤ 8 °C)', cp.durationLe8, 'сут', '', 'param-sm')}${pcard('Средняя Т отоп. периода', cp.meanLe8, '°C', '', 'param-sm')}${pcard('Период при Т ≤ 10 °C', cp.durationLe10, 'сут', '', 'param-sm')}${pcard('Средняя Т при Т ≤ 10 °C', cp.meanLe10, '°C', '', 'param-sm')}</div>
    ${section('Влажность, ветер, осадки')}
    <div class="grid-3">${pcard('Влажность холодн. мес.', cp.humidityCold, '%', '', 'param-sm')}${pcard('Влажность в 15:00', cp.humidityCold15, '%', '', 'param-sm')}${pcard('Осадки ноябрь—март', cp.precipNovMar, 'мм', '', 'param-sm')}${pcard('Преобл. ветер дек—фев', cp.prevailingWindDecFeb, '', '', 'param-sm')}${pcard('Макс. скорость ветра (янв)', cp.maxWindJan, 'м/с', '', 'param-sm')}${pcard('Средняя скорость при Т ≤ 8 °C', cp.meanWindLe8, 'м/с', '', 'param-sm')}</div>
    <div class="param-source" style="padding:10px 0 0">Источник: ${esc(cp.source||'—')}</div>
    ` : '<div class="empty">Для этого города нет данных холодного периода</div>'}
  </div>`;

  // Tab warm
  const wp = d.warmPeriod;
  html += `<div class="tab-content" data-tab="warm">
    ${wp ? `
    ${section('Температуры и давление')}
    <div class="grid-3">${pcard('Барометрическое давление', wp.barometric, 'гПа')}${pcard('Т тёпл. мес., обесп. 0.95', wp.temp095, '°C')}${pcard('Т тёпл. мес., обесп. 0.99', wp.temp099, '°C')}${pcard('Средняя макс. Т тёпл. мес.', wp.meanMaxTempWarmMonth, '°C')}${pcard('Абсолютный максимум', wp.absMax, '°C')}${pcard('Средняя сут. амплитуда', wp.dailyAmplitude, '°C')}</div>
    ${section('Влажность, осадки, ветер')}
    <div class="grid-3">${pcard('Влажность тёпл. мес.', wp.humidityWarm, '%', '', 'param-sm')}${pcard('Влажность в 15:00', wp.humidityWarm15, '%', '', 'param-sm')}${pcard('Осадки апрель—октябрь', wp.precipAprOct, 'мм', '', 'param-sm')}${pcard('Макс. суточные осадки', wp.dailyMaxPrecip, 'мм', '', 'param-sm')}${pcard('Преобл. ветер июнь—авг', wp.prevailingWindJunAug, '', '', 'param-sm')}${pcard('Мин. скорость ветра (июль)', wp.minWindJul, 'м/с', '', 'param-sm')}</div>
    <div class="param-source" style="padding:10px 0 0">Источник: ${esc(wp.source||'—')}</div>
    ` : '<div class="empty">Для этого города нет данных тёплого периода</div>'}
  </div>`;

  // Tab frost
  const fr = d.frostDepth;
  html += `<div class="tab-content" data-tab="frost">
    ${fr ? `
    ${section('Глубина сезонного промерзания, м (СП 22.13330)')}
    <div class="grid-2">${pcard('Суглинки и глины', fr.loamy, 'м')}${pcard('Супеси, пески мелкие/пылеватые', fr.sandyFine, 'м')}${pcard('Пески крупные и средней крупности', fr.sandyCoarse, 'м')}${pcard('Крупнообломочные грунты', fr.coarseFragmental, 'м')}</div>
    <div class="param-source" style="padding:10px 0 0">Источник: ${esc(fr.source||'—')}</div>
    ` : '<div class="empty">Для этого города нет данных по глубине промерзания</div>'}
  </div>`;

  // Tab chart
  const mt = d.monthlyTemps;
  html += `<div class="tab-content" data-tab="chart">
    ${mt && mt.byMonth ? `
    ${section('Среднемесячные температуры, °C')}
    <div class="temp-bar-wrap">
      ${mt.byMonth.map((t,i) => {
        const names = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
        const cls = tempClass(t);
        return `<div class="temp-bar-item">
          <div class="temp-bar-month">${names[i]}</div>
          <div class="temp-bar-value ${cls}">${t===null||t===undefined?'—':esc(String(t))}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="yearly-temp"><span class="label">Среднегодовая: </span><span class="value">${mt.yearly}°C</span></div>

    ${section('Сезонный график')}
    <div class="chart-wrap">
      <canvas id="tempChart" class="chart-canvas"></canvas>
      <div id="chartTooltip"></div>
    </div>
    ` : '<div class="empty">Для этого города нет среднемесячных температур</div>'}
  </div>`;

  html += '</div>';
  content.innerHTML = html;

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.querySelector(`.tab-content[data-tab="${t.dataset.tab}"]`).classList.add('active');
      if (t.dataset.tab==='chart' && mt && mt.byMonth) setTimeout(()=>drawChart(mt.byMonth), 30);
    });
  });

  if (mt && mt.byMonth) setTimeout(()=>drawChart(mt.byMonth), 50);
}

function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function drawChart(data) {
  const cvs = document.getElementById('tempChart');
  if (!cvs) return;
  const wrap = cvs.parentElement;
  const tip = document.getElementById('chartTooltip');
  const ctx = cvs.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth - 48;
  const H = wrap.clientHeight - 40;
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const accent = getCssVar('--accent');
  const muted = getCssVar('--muted');
  const gridColor = getCssVar('--card-border');
  const zeroLine = getCssVar('--chart-zero');
  const chartTop = getCssVar('--chart-area-1');
  const chartBot = getCssVar('--chart-area-5');

  const months = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  const pad = { top: 18, right: 22, bottom: 34, left: 42 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;
  const min = Math.min(...data) - 4;
  const max = Math.max(...data) + 4;
  const range = max - min;

  // area gradient
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, chartTop);
  grad.addColorStop(0.5, chartTop.replace(/[\d.]+\)$/, '0.08)'));
  grad.addColorStop(1, chartBot);

  // grid
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + h * (i / 5);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    const val = max - range * (i / 5);
    ctx.fillStyle = muted;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText((val > 0 ? '+' : '') + val.toFixed(1) + '°', pad.left - 8, y);
  }

  const step = w / 11;
  const points = data.map((v, i) => ({
    x: pad.left + i * step,
    y: pad.top + h - (v - min) / range * h,
    val: v,
    name: months[i]
  }));

  // filled area
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // zero line
  if (max > 0 && min < 0) {
    const y0 = pad.top + h - (0 - min) / range * h;
    ctx.strokeStyle = zeroLine;
    ctx.beginPath(); ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left + w, y0); ctx.stroke();
  }

  // smooth curve
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else {
      const prev = points[i-1];
      const cp1x = prev.x + (p.x - prev.x) * 0.5;
      const cp1y = prev.y;
      const cp2x = prev.x + (p.x - prev.x) * 0.5;
      const cp2y = p.y;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p.x, p.y);
    }
  });
  ctx.stroke();

  // glow
  ctx.strokeStyle = accent.replace(')', ',0.35)').replace('rgb', 'rgba');
  ctx.lineWidth = 8;
  ctx.beginPath();
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else { const prev = points[i-1]; const mx = (prev.x+p.x)/2; ctx.quadraticCurveTo(mx, prev.y, mx, (prev.y+p.y)/2); ctx.quadraticCurveTo(mx, p.y, p.x, p.y); }
  });
  ctx.stroke();

  // points
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = getCssVar('--bg');
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.lineWidth = 2;
    ctx.strokeStyle = p.val > 15 ? '#ffab40' : p.val < -5 ? accent : '#66bb6a';
    ctx.stroke();
  });

  // month labels
  ctx.fillStyle = muted;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  points.forEach(p => {
    ctx.fillText(p.name, p.x, pad.top + h + 8);
  });

  // tooltip interaction
  cvs.onmousemove = e => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let nearest = null;
    let nd = Infinity;
    points.forEach(p => {
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < 28 && d < nd) { nd = d; nearest = p; }
    });
    if (nearest) {
      tip.innerHTML = `<strong>${nearest.name}</strong><br>${nearest.val > 0 ? '+' : ''}${nearest.val} °C`;
      tip.style.opacity = '1';
      tip.style.left = (nearest.x + 8) + 'px';
      tip.style.top = (nearest.y - 40) + 'px';
    } else {
      tip.style.opacity = '0';
    }
  };
  cvs.onmouseleave = () => { tip.style.opacity = '0'; };
  cvs.onclick = () => { tip.style.opacity = '0'; };
}

load();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
